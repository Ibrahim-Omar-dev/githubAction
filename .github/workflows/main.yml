name: first workflow

on:
  push:
    branches:
      - master
    path:
      - "index.html"

jobs:
  example-job:
    runs-on: ubuntu-latest

    steps:
      - name: print a welcome message
        run: echo "welcome to our first github action workflow"
      - name: checkout repository
        uses: actions/checkout@v6.0.2
      - name: list repository
        run: ls -la
